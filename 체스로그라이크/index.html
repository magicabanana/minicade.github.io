<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Roguelike</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="scene-manager">

        <!-- TITLE SCENE -->
        <div id="title-scene" class="scene active">
            <h1>Chess Roguelike</h1>
            <p>Control the Black Queen. Defeat the infinite white army.</p>
            <button id="btn-start" class="btn-primary">Start Game</button>
        </div>

        <!-- GAME SCENE -->
        <div id="game-scene" class="scene">
            <h1 id="round-display">Round 1</h1>
            <div class="status-panel">
                <div id="status">Player's Turn (Black)</div>
                <div class="stats-container">
                    <div id="ap-display">AP: ⚡⚡</div>
                </div>
            </div>
            <div id="chessboard"></div>

            <!-- JRPG Party HUD -->
            <div id="party-hud">
                <!-- 4 Slots generated dynamically by JS, but here is the skeleton structure for reference/fallback -->
                <div class="hud-slot" id="hud-slot-0"></div>
                <div class="hud-slot" id="hud-slot-1"></div>
                <div class="hud-slot" id="hud-slot-2"></div>
                <div class="hud-slot" id="hud-slot-3"></div>
            </div>
        </div>

        <!-- UPGRADE SCENE -->
        <div id="upgrade-scene" class="scene">
            <h1>Round Clear!</h1>
            <p>Select an upgrade for the next round:</p>
            <div class="upgrade-container">
                <!-- Upgrade Cards Generated by JS -->
            </div>
        </div>

        <!-- GAME OVER SCENE -->
        <div id="game-over-scene" class="scene">
            <h1>Game Over</h1>
            <p id="final-score-display">You survived until Round X</p>
            <button id="btn-restart" class="btn-primary">Back to Title</button>
        </div>

    </div>

    <script src="chesspiece.js"></script>
    <script src="chessboardManager.js"></script>
    <script src="effectManager.js"></script>
    <script src="inputManager.js"></script>
    <script src="gameManager.js"></script>
</body>

</html>
